name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build WaveBoost.zip
        run: |
          zip -r WaveBoost.zip \
            manifest.json \
            icons/ \
            popup/ \
            content/ \
            LICENSE \
            README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: WaveBoost.zip
